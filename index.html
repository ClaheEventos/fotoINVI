<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subir Fotos - Evento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #ffffff;
            --bg: #050505;
            --card-bg: #111111;
            --text-muted: #888888;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #151515 0%, #050505 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .main-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .glass-card {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-icon { 
            font-size: 3rem; 
            margin-bottom: 10px; 
        }
        
        h1 { 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -0.5px; 
        }
        
        .card-header p { 
            color: var(--text-muted); 
            font-size: 0.9rem; 
            margin-top: 8px; 
            margin-bottom: 30px; 
        }

        /* Zona de interacción */
        .upload-zone {
            width: 100%;
            aspect-ratio: 1;
            background: #181818;
            border: 2px dashed #333;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .upload-zone:hover { 
            border-color: #555; 
            background: #1d1d1d; 
        }
        
        .upload-zone.has-preview { 
            border-style: solid; 
            border-color: #222; 
        }

        .img-fluid { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            animation: fadeIn 0.4s ease; 
        }

        .placeholder-content { 
            color: #555; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
        }
        
        .plus-icon { 
            font-size: 2.5rem; 
            font-weight: 200; 
        }

        /* Botón */
        .btn-upload {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-upload:active { 
            transform: scale(0.97); 
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Pantalla de Carga */
        .loading-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .shimmer-text {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #fff;
            opacity: 0.8;
        }

        .progress-track {
            width: 140px;
            height: 3px;
            background: #222;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #222, #fff, #222);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite linear;
        }

        .status-feedback {
            margin-top: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .evento-id {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #333;
            word-break: break-all;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        @keyframes shimmer { 
            0% { background-position: -200% 0; } 
            100% { background-position: 200% 0; } 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="glass-card">
            <header class="card-header">
                <div class="brand-icon">??</div>
                <h1>Captura el Momento</h1>
                <p>Sube tus fotos favoritas del evento</p>
            </header>

            <!-- Zona de Carga / Vista Previa -->
            <div class="upload-zone" id="uploadZone">
                <div class="placeholder-content" id="placeholderContent">
                    <div class="plus-icon">+</div>
                    <span>Tomar foto o elegir archivo</span>
                </div>
                <img id="preview" class="img-fluid" style="display: none;" alt="Preview">
            </div>
            
            <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">

            <!-- Botón de Acción -->
            <button class="btn-upload" id="uploadBtn" style="display: none;">ENVIAR FOTOGRAFÍA</button>

            <!-- Pantalla de Carga Premium -->
            <div class="loading-container" id="loadingContainer" style="display: none;">
                <div class="spinner"></div>
                <div class="loading-info">
                    <span class="shimmer-text" id="loadingMessage">PREPARANDO IMAGEN...</span>
                    <div class="progress-track">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Mensaje de Estado (Éxito/Error) -->
            <p class="status-feedback" id="statusMessage"></p>
            
            <!-- Evento ID (oculto, solo para referencia) -->
            <div class="evento-id" id="eventoId"></div>
        </div>
    </div>

    <script>
        // Configuración
        const WEBAPP_URL = "https://script.google.com/a/macros/claheeventos.com/s/AKfycbwtMwDHjhBbomOrbNhM5Bv9FcbHLI0ElcLUbvLw4T6467EzrLa3c5T9Hjt9hYgiPoo_/exec";
        
        // Obtener eventoId de la URL
        const pathParts = window.location.pathname.split('/');
        const eventoId = pathParts[pathParts.length - 1] || 'evento-default';
        
        // Elementos del DOM
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const placeholderContent = document.getElementById('placeholderContent');
        const uploadBtn = document.getElementById('uploadBtn');
        const loadingContainer = document.getElementById('loadingContainer');
        const loadingMessage = document.getElementById('loadingMessage');
        const statusMessage = document.getElementById('statusMessage');
        const eventoIdElement = document.getElementById('eventoId');

        // Estado
        let selectedFile = null;
        let isLoading = false;

        // Mostrar eventoId (opcional)
        eventoIdElement.textContent = `Evento: ${eventoId}`;

        // Función para convertir archivo a Base64
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }

        // Manejar clic en zona de carga
        uploadZone.addEventListener('click', () => {
            if (!isLoading) {
                fileInput.click();
            }
        });

        // Manejar selección de archivo
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files?.[0] || null;
            selectedFile = file;
            
            if (file) {
                // Mostrar preview
                const objectUrl = URL.createObjectURL(file);
                preview.src = objectUrl;
                preview.style.display = 'block';
                placeholderContent.style.display = 'none';
                uploadZone.classList.add('has-preview');
                
                // Mostrar botón de subir
                uploadBtn.style.display = 'block';
                statusMessage.textContent = '';
                
                // Limpiar URL object cuando ya no se necesite
                preview.onload = () => URL.revokeObjectURL(objectUrl);
            } else {
                // Resetear vista
                preview.style.display = 'none';
                placeholderContent.style.display = 'flex';
                uploadZone.classList.remove('has-preview');
                uploadBtn.style.display = 'none';
            }
        });

        // Manejar subida
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !eventoId || isLoading) return;

            isLoading = true;
            uploadBtn.disabled = true;
            uploadBtn.style.display = 'none';
            loadingContainer.style.display = 'flex';
            statusMessage.textContent = '';

            try {
                loadingMessage.textContent = 'PREPARANDO IMAGEN...';
                const base64 = await toBase64(selectedFile);
                
                loadingMessage.textContent = 'SUBIENDO ...';
                
                // Enviar a Google Apps Script
                await fetch(WEBAPP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "subirFoto",
                        eventoId: eventoId,
                        filename: selectedFile.name,
                        base64: base64,
                    }),
                });

                // Éxito
                statusMessage.textContent = '? ˇSUBIDA COMPLETADA!';
                
                // Resetear formulario
                selectedFile = null;
                fileInput.value = '';
                preview.style.display = 'none';
                placeholderContent.style.display = 'flex';
                uploadZone.classList.remove('has-preview');
                
                // Limpiar mensaje después de 3 segundos
                setTimeout(() => {
                    statusMessage.textContent = '';
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                statusMessage.textContent = '? ERROR DE CONEXIÓN';
            } finally {
                isLoading = false;
                loadingContainer.style.display = 'none';
                uploadBtn.disabled = false;
                uploadBtn.style.display = selectedFile ? 'block' : 'none';
            }
        });

        // Prevenir comportamiento por defecto del drag & drop
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => e.preventDefault());
    </script>
</body>
</html>
